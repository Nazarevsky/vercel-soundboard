<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select and Play Sound</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/snowflakes.css">
    <link rel="icon" href="/favicon.ico">
</head>
<body>
    <div class="snowflakes"></div>

    <main class="container">
        <label class="field-label" for="soundSelect">Sound</label>
        <select class="sound-select" id="soundSelect"></select>

        <div class="button-container">
            <button class="button button-random" id="randomButton" type="button">Random</button>
            <button class="button button-start" id="startButton" type="button">Start</button>
            <button class="button button-stop" id="stopButton" type="button">Stop</button>
        </div>

        <label class="field-label" for="volumeSlider">Volume</label>
        <div class="slider-row">
            <input class="range-slider" type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
            <output class="slider-value" id="volumeValue" for="volumeSlider">100%</output>
        </div>

        <label class="field-label" for="speedSlider">Speed</label>
        <div class="slider-row">
            <input class="range-slider" type="range" id="speedSlider" min="0.25" max="3" step="0.05" value="1">
            <output class="slider-value" id="speedValue" for="speedSlider">1x</output>
        </div>
    </main>

    <script src="scripts/script.js"></script>
    <script src="scripts/snowflakes.js"></script>
</body>
</html>
